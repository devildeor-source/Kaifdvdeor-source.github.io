<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics AI Knowledge Base</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Keeps search bar at the bottom */
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        #response-container {
            flex-grow: 1;
            display: none;
            margin-bottom: 20px;
            color: white;
            line-height: 1.6;
            max-width: 600px;
            text-align: left;
            padding: 20px;
            border-left: 3px solid #00f7ff;
            background: rgba(255,255,255,0.07);
            border-radius: 0 10px 10px 0;
            font-size: 1.1rem;
            align-self: flex-start;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00f7ff;
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="response-container"></div>

    <h1 id="hello" style="text-align: center; margin-bottom: 20px;">Hello</h1>

    <div class="searchContainer">
        <input type="text" id="message" placeholder="Ask anything from your PDFs..." autocomplete="off">
        <button onclick="handleSend()" id="sendBtn">
            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="24" width="24" xmlns="http://www.w3.org/2000/svg">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
